services:
  # 🐇 Component 2: RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: ucis-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672" # AMQP port for producers/consumers
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./config/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - ucis-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 🗄️ Component 5: MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: ucis-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ucis_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./config/schemas/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - ucis-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 🧩 Component 1: Multi-Domain Simulator
  simulator:
    build:
      context: ./services/simulator
      dockerfile: Dockerfile
    container_name: ucis-simulator
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/ucis_db?authSource=admin
      EVENT_RATE: ${EVENT_RATE}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - ucis-network
    restart: unless-stopped
    volumes:
      - ./config/schemas/events_schema.json:/app/config/schemas/events_schema.json:ro

  # 🧠 Component 3: CEP Engine
  cep-engine:
    build:
      context: ./services/cep-engine
      dockerfile: Dockerfile
    container_name: ucis-cep-engine
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MONGO_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/ucis_db?authSource=admin
      CEP_RULES_PATH: /app/config/patterns
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8081:8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - ucis-network
    restart: unless-stopped
    volumes:
      - ./config/patterns:/app/config/patterns:ro

  # 🧬 Component 4: Event Enricher
  enricher:
    build:
      context: ./services/enricher
      dockerfile: Dockerfile
    container_name: ucis-enricher
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MONGO_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/ucis_db?authSource=admin
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8082:8082"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - ucis-network
    restart: unless-stopped

  # 🌐 Component 6: API Backend
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: ucis-api
    environment:
      MONGO_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/ucis_db?authSource=admin
      FLASK_ENV: ${FLASK_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ucis-network
    restart: unless-stopped

  # 🖥️ Component 7: React Frontend
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:3000/api
        REACT_APP_WEBSOCKET_URL: ws://localhost:3000
    container_name: ucis-frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - ucis-network
    restart: unless-stopped

networks:
  ucis-network:
    driver: bridge

volumes:
  rabbitmq_data:
    driver: local
  mongodb_data:
    driver: local
