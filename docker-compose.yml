services:
  # 🐇 Component 2: RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: ucis-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT_AMQP_HOST}:5672"
      - "${RABBITMQ_PORT_MGMT_HOST}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./config/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - ucis-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # 🗄️ Component 5: MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: ucis-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ucis_db
    ports:
      - "${MONGO_PORT_HOST}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./config/schemas/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - ucis-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # 🧩 Component 1: Multi-Domain Simulator
  simulator:
    build:
      context: ./services/simulator
      dockerfile: Dockerfile
    container_name: ucis-simulator
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MONGO_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/ucis_db?authSource=admin
      EVENT_RATE: ${EVENT_RATE}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - ucis-network
    restart: unless-stopped
    volumes:
      - ./config/schemas/events_schema.json:/app/config/schemas/events_schema.json:ro

  # 🧠 Component 3: CEP Engine
  cep-engine:
    build:
      context: ./services/cep-engine
      dockerfile: Dockerfile
    container_name: ucis-cep-engine
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MONGO_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/ucis_db?authSource=admin
      CEP_RULES_PATH: /app/config/patterns
      LOG_LEVEL: ${LOG_LEVEL}
      # Increase heap so Esper sliding-window state (4-stream joins over 10 min) fits.
      # G1GC keeps pause times low on a steady high-throughput stream.
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Dcep.consumer.prefetch=200"
    ports:
      - "${CEP_PORT_HOST}:8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - ucis-network
    restart: unless-stopped
    volumes:
      - ./config/patterns:/app/config/patterns:ro

  # 🧬 Component 4: Event Enricher
  enricher:
    build:
      context: ./services/enricher
      dockerfile: Dockerfile
    container_name: ucis-enricher
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MONGO_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/ucis_db?authSource=admin
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${ENRICHER_PORT_HOST}:8082"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - ucis-network
    restart: unless-stopped

  # 🔌 Component 8: WebSocket Server
  websocket:
    build:
      context: ./services/websocket
      dockerfile: Dockerfile
    container_name: ucis-websocket
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${WEBSOCKET_PORT_HOST}:${WEBSOCKET_PORT_INTERNAL}"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ucis-network
    restart: unless-stopped

  # 🌐 Component 6: API Backend
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: ucis-api
    environment:
      MONGO_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/ucis_db?authSource=admin
      FLASK_ENV: ${FLASK_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${API_PORT_HOST}:${API_PORT_INTERNAL}"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ucis-network
    restart: unless-stopped
    volumes:
      - ./config/patterns:/app/config/patterns:ro
      - ./config/scenarios:/app/config/scenarios:ro

  # 🖥️ Component 7: React Frontend
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:${API_PORT_HOST}/api
        REACT_APP_WEBSOCKET_URL: http://localhost:${WEBSOCKET_PORT_HOST}
    container_name: ucis-frontend
    ports:
      - "${FRONTEND_PORT_HOST}:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - ucis-network
    restart: unless-stopped

networks:
  ucis-network:
    driver: bridge

volumes:
  rabbitmq_data:
    driver: local
  mongodb_data:
    driver: local
