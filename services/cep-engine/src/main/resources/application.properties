spring.application.name=ucis-cep-engine
server.port=8081

# RabbitMQ Configuration
rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
rabbitmq.port=${RABBITMQ_PORT:5672}
rabbitmq.username=${RABBITMQ_USERNAME:admin}
rabbitmq.password=${RABBITMQ_PASSWORD:admin123}

# MongoDB Configuration
mongodb.uri=${MONGO_URI:mongodb://admin:admin123@mongodb:27017/ucis_db?authSource=admin}

# CEP Configuration
cep.rules.path=${CEP_RULES_PATH:/app/config/patterns}
cep.thread.pool.size=16

# Logging
logging.level.root=INFO
logging.level.com.ucis.cep=DEBUG
logging.level.com.espertech=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# Health check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
